services:
  web:
    # Build the CPU-optimised image instead of the CUDA one:
    # python:3.11-slim base (~40 MB) + CPU torch wheels + onnxruntime
    # (CPU) + openvino. Total ~1.2 GB vs ~5 GB for the CUDA image.
    # No NVIDIA driver or CUDA runtime needed on the host.
    build:
      context: .
      dockerfile: Dockerfile.cpu
    # Drop the GPU device reservation so compose up works on hosts
    # with no NVIDIA GPU (and no nvidia-container-toolkit installed).
    deploy:
      resources:
        reservations:
          devices: []
  rfdetr:
    # RF-DETR native .pth inference is GPU-only in practice (transformer
    # backbone + DINOv2 attention are too slow on CPU for real-time).
    # Sidecar is left in the compose topology for parity but is
    # effectively unused on CPU hosts — the web service won't try to
    # reach it unless an operator picks a .pth weight, which the CPU
    # backends don't accept.
    deploy:
      resources:
        reservations:
          devices: []
