services:
  web:
    # Build the CPU-optimised image instead of the CUDA one:
    # python:3.11-slim base (~40 MB) + CPU torch wheels + onnxruntime
    # (CPU) + openvino. Total ~1.2 GB vs ~5 GB for the CUDA image.
    # No NVIDIA driver or CUDA runtime needed on the host.
    build:
      context: .
      dockerfile: Dockerfile.cpu
    # No GPU device reservation needed — the base file is now
    # device-agnostic. docker-compose.gpu.yml adds nvidia reservations
    # for GPU hosts.
    # The base 'depends_on: rfdetr' uses `required: false` so web
    # starts fine when the rfdetr sidecar is profile-gated off on CPU.
