site_name: IsiDetector
site_description: Modular Instance Segmentation Pipeline for Industrial Parcel Detection
site_author: waledroid
repo_url: https://github.com/waledroid/IsiDetector
repo_name: waledroid/IsiDetector
copyright: "for ISITEC International 2026"

theme:
  name: material
  icon:
    logo: material/cube-scan
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/waledroid/IsiDetector

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - footnotes

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            heading_level: 3
            show_bases: true
            filters:
              - "!^__"       # hide dunder methods
              - "!^_[^_]"   # hide private single-underscore by default
              - "^_inject"   # but always show _inject_framework_hooks (subclassing contract)
              - "^_setup"    # and _setup_run_dir
              - "^_flush"    # and _flush_memory

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Deployment (Docker): deployment.md
  - Architecture:
    - architecture/index.md
    - System Overview: architecture/overview.md
    - Registry Pattern: architecture/registry.md
    - BaseTrainer Contract: architecture/base-trainer.md
  - Web Platform:
    - web-app/index.md
    - Functionalities: web-app/functionalities.md
  - Trainers:
    - trainers/index.md
    - YOLOv26-seg: trainers/yolo.md
    - RF-DETR-Seg: trainers/rfdetr.md
  - Modules:
    - modules/index.md
    - Shared Vision Engine: modules/vision-engine.md
    - Industry Analytics: modules/analytics.md
    - Hook System: hooks/index.md
    - Inference Engines:
      - Overview: inference/index.md
      - Export Engine: inference/export.md
      - ONNX Engine: inference/onnx.md
      - OpenVINO Engine: inference/openvino.md
      - TensorRT Engine: inference/tensorrt.md
    - Performance Monitor: modules/performance.md
    - Preprocessing: preprocessing/index.md
  - Configuration: config/index.md
