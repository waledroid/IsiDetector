# configs/optimizers/rfdetr_optim.yaml

epochs: 105 
batch_size: 2           # Keep at 4 to protect your 12GB VRAM
image_size: 640         # Must be divisible by 56 for DINOv2

optimizer:
  type: "AdamW"
  lr: 0.0001            # 1e-4 for the Head
  lr_encoder: 0.00001   # 1e-5 for the DINOv2 Backbone (CRITICAL)
  weight_decay: 0.0001

# Transformer-Specific Stability Tricks
training_tricks:
  use_ema: true         # Exponential Moving Average for smoother weights
  grad_accum_steps: 8   # 4 batch * 4 accum = 16 effective batch size

early_stopping:
  enabled: true
  patience: 7           # Roboflow recommended patience

