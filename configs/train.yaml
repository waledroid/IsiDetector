# configs/train.yaml
project_name: "isiDetector"
nc: 2
class_names: ["carton", "polybag"]
hooks:
  - "IndustrialLogger"

# =========================================================
# 🛑 ACTIVE ENGINE SWITCHBOARD (Uncomment ONE block below)
# =========================================================

# ---------------------------------------------------------
# 🚀 OPTION A: YOLOv8 (CNN) - Fast, grid-based, high batch size
# ---------------------------------------------------------
model_type: "yolo"
model_size: "m"
dataset_path: "data/universal_dataset"
optimizer_config: "configs/optimizers/yolo_optim.yaml"
batch_size: 16
image_size: 640
mixed_precision: true 
# YOLO Specific Augmentations
# hsv_h: 0.015  
# hsv_s: 0.7    
# hsv_v: 0.4    
fliplr: 0.5   
mosaic: 1.0   
scale: 0.5    

# ---------------------------------------------------------
# 🤖 OPTION B: RF-DETR (Transformer) - DINOv2 Backbone, Global Context
# ---------------------------------------------------------
# model_type: "rfdetr"
# model_size: "m"
# optimizer_config: "configs/optimizers/rfdetr_optim.yaml"
# dataset_path: "data/rfdetr_dataset"
# batch_size: 2      #4 default   # Keep low to prevent VRAM crashes
# image_size: 640
# mixed_precision: true


inference:
  conf_threshold: 0.3      # AI confidence cutoff
  tracker:
    track_buffer: 60       # Frames to wait before dropping ID
    match_thresh: 0.9      # Strictness of ID matching
  logging:
    enabled: true
    save_interval: 3600    # 3600 = 1 Hour, 60 = 1 Minute # 15 to test
    log_dir: "logs"
