services:
  web:
    # Build context is the repo root (one level up from this compose file
    # which now lives at deploy/docker-compose.yml); the Dockerfile itself
    # is inside deploy/. Volume sources reference the new bucket paths —
    # ../isidet/..., ../webapp/..., ../mkdocs/...
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: isitec-visionai
    ports:
      - "9501:9501"
      - "9502:9502/udp"
    volumes:
      - ../isidet/models:/opt/isitec/isidet/models
      - ../isidet/runs:/opt/isitec/isidet/runs
      - ../isidet/configs:/opt/isitec/isidet/configs
      - ../webapp/isitec_app/logs:/opt/isitec/webapp/isitec_app/logs
      - ../webapp/isitec_app/uploads:/opt/isitec/webapp/isitec_app/uploads
      - ../webapp/isitec_app/settings.json:/opt/isitec/webapp/isitec_app/settings.json
      - ../mkdocs/site:/opt/isitec/webapp/isitec_app/static/docs:ro
      # NOTE: X11 / WSLG bind mounts intentionally absent. They were
      # only useful when running `cv2.imshow()` from inside the
      # container (dev workflow). Production uses the web UI exclusively;
      # mounting /mnt/wslg breaks startup on native Linux site PCs that
      # have no /mnt/wslg path. If a developer needs cv2.imshow, add
      # these back in a local docker-compose.override.yml — never here.
    environment:
      - TZ=Europe/Paris
      - DEV_PASSWORD=${DEV_PASSWORD:-change-me}
      - PORT=9501
      - UDP_HOST=127.0.0.1
      - UDP_PORT=9502
      - CUDA_MODULE_LOADING=LAZY
      # Default RTSP transport for any code path that doesn't explicitly
      # set its own. LiveReader (in stream_handler.py) overrides this
      # per-call with a TCP-first / UDP-fallback dance — but any third-party
      # code that calls cv2.VideoCapture('rtsp://...') without going
      # through LiveReader inherits this default. Kept here so RTSP-over-TCP
      # is the documented out-of-the-box behaviour.
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
    # GPU device reservation is added via docker-compose.gpu.yml — the
    # base file stays device-agnostic so CPU hosts don't need any
    # nested-array override gymnastics to drop the nvidia request.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9501/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      rfdetr:
        condition: service_healthy
        # required: false → web still starts when rfdetr is absent
        # (CPU mode, where the 'gpu' profile isn't active and the
        # sidecar is skipped entirely). Needs Compose 2.24+.
        required: false

  rfdetr:
    # Activated only when the 'gpu' profile is passed — the sidecar runs
    # PyTorch + RF-DETR natively and needs CUDA. On CPU hosts this service
    # is skipped entirely (no build, no start, no 'nvidia runtime' error).
    # run_start.sh / up.sh add --profile gpu automatically when a GPU is
    # detected; CPU runs don't pass the flag so this whole block is inert.
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.rfdetr
    image: isitec-rfdetr
    volumes:
      - ../isidet/models:/opt/rfdetr/models
      - ../isidet/configs:/opt/rfdetr/configs
    environment:
      - TZ=Europe/Paris
      - CUDA_MODULE_LOADING=LAZY
      - PYTORCH_JIT=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9510/health"]
      interval: 30s
      timeout: 5s
      retries: 5
